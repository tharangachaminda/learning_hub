<!-- Student Dashboard Template (AC2, AC11, AC19, AC20, AC25) -->
<div role="main" aria-label="Student dashboard" class="dashboard-container">
  <!-- Loading State (AC19) -->
  @if (loading) {
  <div
    data-testid="dashboard-loading"
    class="loading-container"
    aria-busy="true"
    aria-label="Loading dashboard"
  >
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading your dashboard...</span>
    </div>
    <p class="loading-text">
      <fa-icon [icon]="loadingIcon"></fa-icon>
      Loading your dashboard...
    </p>
  </div>
  }

  <!-- Error State (AC20) -->
  @if (error) {
  <div data-testid="dashboard-error" class="error-container" role="alert">
    <p class="error-icon"><fa-icon [icon]="errorIcon"></fa-icon></p>
    <p class="error-message">{{ error }}</p>
    <button
      class="btn btn-primary retry-btn"
      (click)="loadDashboard()"
      aria-label="Try loading dashboard again"
    >
      <fa-icon [icon]="retryIcon"></fa-icon>
      Try Again
    </button>
  </div>
  }

  <!-- Dashboard Content -->
  @if (dashboardData && !loading) {
  <!-- Welcome Banner (AC2, AC11) -->
  <app-page-hero
    data-testid="welcome-banner"
    appearance="brand"
    [title]="getGreeting() + ', ' + dashboardData.student.firstName"
    description="Your dashboard, achievements, and performance are connected in one place."
    [actions]="heroActions"
  >
  </app-page-hero>

  <div class="dashboard-summary" aria-label="Dashboard summary">
    @for (card of summaryCards; track card.label) {
    <article class="dashboard-summary__card">
      <p class="dashboard-summary__label">{{ card.label }}</p>
      <h2>{{ card.value }}</h2>
      <p class="dashboard-summary__detail">{{ card.detail }}</p>
    </article>
    }
  </div>

  <div class="dashboard-layout">
    <div class="dashboard-layout__primary">
      <app-subject-cards
        [subjects]="dashboardData.subjects"
        (practiceSubject)="onPracticeSubject($event)"
      >
      </app-subject-cards>

      <app-ai-recommendations
        [recommendations]="dashboardData.recommendations"
        (startPractice)="onStartPractice($event)"
      >
      </app-ai-recommendations>
    </div>

    <div class="dashboard-layout__secondary">
      <app-recent-activity [recentActivity]="dashboardData.recentActivity">
      </app-recent-activity>

      <div class="dashboard-achievements-preview">
        <div class="dashboard-achievements-preview__header">
          <div>
            <p class="dashboard-section__eyebrow">Motivation</p>
            <h2>Recent wins</h2>
          </div>
          <a routerLink="/achievements">See all</a>
        </div>

        <app-achievement-showcase [achievements]="dashboardData.achievements">
        </app-achievement-showcase>
      </div>
    </div>
  </div>
  }
</div>
