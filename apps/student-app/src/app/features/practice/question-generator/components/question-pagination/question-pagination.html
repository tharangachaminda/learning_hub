<!-- Progress Bar -->
<div
  class="progress-bar-container"
  data-testid="progress-bar"
  role="progressbar"
  [attr.aria-valuenow]="progressPercent()"
  aria-valuemin="0"
  aria-valuemax="100"
  [attr.aria-label]="'Answered ' + totalAnswered() + ' of ' + totalQuestions() + ' questions'"
>
  <div
    class="progress-bar-fill"
    data-testid="progress-fill"
    [style.width.%]="progressPercent()"
  ></div>
</div>

<!-- Navigation Controls -->
<div class="pagination-controls">
  <button
    type="button"
    class="nav-btn nav-btn--prev"
    data-testid="prev-btn"
    [disabled]="currentIndex() === 0"
    (click)="onPrevious()"
    aria-label="Go to previous question"
  >
    ← Previous
  </button>

  <div
    class="question-jump-grid"
    data-testid="question-jump-grid"
    role="group"
    aria-label="Question navigation"
  >
    @for (questionIndex of questionIndexes(); track questionIndex) {
    <button
      type="button"
      class="question-jump-btn"
      [class.question-jump-btn--current]="currentIndex() === questionIndex"
      [class.question-jump-btn--answered]="isAnswered(questionIndex)"
      [attr.data-testid]="'question-jump-' + (questionIndex + 1)"
      [attr.aria-current]="currentIndex() === questionIndex ? 'step' : null"
      [attr.aria-label]="'Go to question ' + (questionIndex + 1) + (isAnswered(questionIndex) ? ', answered' : ', unanswered')"
      (click)="onSelectQuestion(questionIndex)"
    >
      {{ questionIndex + 1 }}
    </button>
    }
  </div>

  <button
    type="button"
    class="nav-btn nav-btn--next"
    data-testid="next-btn"
    [disabled]="currentIndex() === totalQuestions() - 1"
    (click)="onNext()"
    aria-label="Go to next question"
  >
    Next →
  </button>
</div>
